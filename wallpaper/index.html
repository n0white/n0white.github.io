<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>n0widgets Wallpapers</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const pkg = "com.n0white.n0widgets";
        let playStoreUrl = "https://play.google.com/store/apps/details?id=" + pkg;
        if (id) {
            playStoreUrl += "&referrer=wallpaper_id%3D" + id;
        }
        window.location.href = playStoreUrl;
    </script>
</head>

<body>
    <p>Redirecting to Google Play Store...</p>
</body>

</html>
